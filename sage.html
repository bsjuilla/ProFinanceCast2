<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F4ED" />
  <title>Sage — ProFinanceCast</title>
  <link rel="icon" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/css/pfc-tokens.css" />
  <link rel="stylesheet" href="/css/pfc-base.css" />
  <link rel="stylesheet" href="/css/pfc-layout.css" />
  <link rel="stylesheet" href="/css/pfc-components.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,1,400&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    .sage-grid {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: var(--space-7);
      padding-top: var(--space-5);
    }
    @media (max-width: 1024px) {
      .sage-grid { grid-template-columns: 1fr; gap: var(--space-6); }
    }

    /* LEFT — editorial Q&A */
    .sage-left { min-width: 0; display: flex; flex-direction: column; gap: var(--space-6); }
    .sage-headline {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: var(--type-display-lg);
      line-height: 1.04;
      letter-spacing: var(--track-display);
      color: var(--ink-1);
      text-align: center;
      padding: var(--space-5) 0 var(--space-3);
    }
    .sage-headline em {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }

    .sage-composer { display: flex; flex-direction: column; gap: var(--space-3); }
    .sage-input {
      font-family: var(--font-body);
      font-size: var(--type-body-lg);
      line-height: 1.5;
      min-height: 96px;
      padding: var(--space-4);
      background: var(--canvas-raised);
      border: 1px solid var(--ink-4);
      border-radius: var(--radius-3);
      color: var(--ink-1);
      resize: vertical;
      width: 100%;
      transition: border-color var(--dur-fast) var(--ease-out);
    }
    .sage-input:focus { outline: none; border-color: var(--accent); }
    .sage-input::placeholder { color: var(--ink-3); }
    .sage-composer__actions { display: flex; justify-content: flex-end; }

    /* Suggested pills */
    .sage-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }
    .sage-prompt {
      font-family: var(--font-body);
      font-size: var(--type-body-sm);
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-wash);
      border: none;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background-color var(--dur-fast) var(--ease-out);
    }
    .sage-prompt:hover { background: oklch(0.91 0.040 25); }

    /* Past conversations — editorial */
    .sage-history {
      display: flex; flex-direction: column;
      border-top: 1px solid var(--ink-5);
    }
    .sage-history__item {
      padding: var(--space-5) 0;
      border-bottom: 1px solid var(--ink-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .sage-history__q {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 400;
      font-size: var(--type-display-sm);
      line-height: 1.2;
      letter-spacing: var(--track-display);
      color: var(--ink-1);
    }
    .sage-history__a {
      font-family: var(--font-body);
      font-size: var(--type-body);
      line-height: var(--lead-body);
      color: var(--ink-2);
      max-width: 64ch;
    }
    .sage-history__continue {
      font-size: var(--type-body-sm);
      color: var(--ink-1);
      align-self: flex-start;
      transition: color var(--dur-fast) var(--ease-out);
    }
    .sage-history__continue::after {
      content: " →";
      color: var(--accent);
      transition: transform var(--dur-fast) var(--ease-out);
      display: inline-block;
    }
    .sage-history__continue:hover { color: var(--accent); }
    .sage-history__continue:hover::after { transform: translateX(2px); }

    /* RIGHT — observations panel (the only proper card) */
    .sage-right {
      align-self: start;
      position: sticky;
      top: calc(var(--topbar-h) + var(--space-5));
    }
    @media (max-width: 1024px) { .sage-right { position: static; } }

    .sage-panel__title {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: var(--type-display-sm);
      line-height: 1.15;
      letter-spacing: var(--track-display);
      color: var(--ink-1);
      margin-bottom: var(--space-5);
    }
    .sage-observations { display: flex; flex-direction: column; gap: var(--space-4); }
    .sage-observation {
      display: grid;
      grid-template-columns: 12px 1fr;
      column-gap: var(--space-3);
      row-gap: var(--space-2);
      padding-top: var(--space-4);
      border-top: 1px solid var(--ink-5);
    }
    .sage-observation:first-child { padding-top: 0; border-top: 0; }
    .sage-observation__dot {
      width: 6px; height: 6px;
      background: var(--accent);
      margin-top: 9px;
      align-self: start;
    }
    .sage-observation__text {
      font-size: var(--type-body);
      line-height: 1.5;
      color: var(--ink-1);
    }
    .sage-observation__more {
      grid-column: 2;
      font-size: var(--type-meta);
      color: var(--ink-3);
      transition: color var(--dur-fast) var(--ease-out);
    }
    .sage-observation__more::after {
      content: " →"; color: var(--accent);
      transition: transform var(--dur-fast) var(--ease-out);
      display: inline-block;
    }
    .sage-observation__more:hover { color: var(--accent); }
    .sage-observation__more:hover::after { transform: translateX(2px); }

    .sage-panel__footer {
      margin-top: var(--space-5);
      padding-top: var(--space-4);
      border-top: 1px solid var(--ink-5);
      font-size: var(--type-meta);
      color: var(--ink-3);
    }

    /* Capabilities strip */
    .sage-capabilities {
      margin-top: var(--space-7);
      padding: var(--space-4) 0;
      border-top: 1px solid var(--ink-5);
      font-size: var(--type-body-sm);
      color: var(--ink-3);
      line-height: 1.5;
      text-align: center;
    }
    .sage-capabilities strong { color: var(--ink-2); font-weight: 500; }
  </style>
</head>

<body data-page="sage">
  <div class="app-shell">
    <div data-include="/partials/sidebar.html"></div>

    <div class="app-content">
      <div data-include="/partials/topbar.html"></div>

      <main class="app-main" role="main">
        <div class="page-section page-section--app" data-reveal-stagger>

          <div class="sage-grid">

            <!-- LEFT 60% — editorial Q&A -->
            <section class="sage-left" aria-label="Ask Sage">
              <h2 class="sage-headline">What&rsquo;s on your <em>mind</em>?</h2>

              <form class="sage-composer" id="sageForm" onsubmit="event.preventDefault();">
                <label class="visually-hidden" for="sageInput">Ask Sage a question</label>
                <textarea
                  class="sage-input"
                  id="sageInput"
                  placeholder="When can I afford a house in NYC?"
                  rows="3"
                ></textarea>
                <div class="sage-composer__actions">
                  <button class="pfc-button pfc-button--primary" type="submit">Ask Sage</button>
                </div>
              </form>

              <div class="sage-prompts" role="list" aria-label="Suggested prompts">
                <button class="sage-prompt" type="button" role="listitem">Can I retire at 55?</button>
                <button class="sage-prompt" type="button" role="listitem">Should I pay off the credit card first?</button>
                <button class="sage-prompt" type="button" role="listitem">Is my savings rate good?</button>
                <button class="sage-prompt" type="button" role="listitem">When will I hit $100K?</button>
                <button class="sage-prompt" type="button" role="listitem">Stress-test my emergency fund</button>
              </div>

              <div class="sage-history" id="sageHistory" aria-label="Past conversations">
                <!-- filled by JS -->
              </div>
            </section>

            <!-- RIGHT 40% — observations panel -->
            <aside class="sage-right">
              <div class="pfc-panel" aria-labelledby="obs-h">
                <h2 class="sage-panel__title" id="obs-h">Sage&rsquo;s quiet observations</h2>
                <div class="sage-observations" id="sageObs"><!-- filled by JS --></div>
                <p class="sage-panel__footer">Updated Sunday. Math, not opinion.</p>
              </div>
            </aside>

          </div>

          <p class="sage-capabilities">
            <strong>Sage can:</strong> forecast scenarios &middot; explain transactions &middot; summarize your month &middot; plan toward a goal &middot; stress-test your buffer.
          </p>

        </div>
      </main>
    </div>
  </div>

  <div data-include="/partials/bottom-tabs.html"></div>

  <script src="/js/pfc-include.js"></script>
  <script src="/js/pfc-app.js"></script>
  <script>
    window.PFC_PAGE_INIT = function () {
      PFC.setTopbar({
        title: "Sage",
        subtitle: "Ask Sage anything about your money. Sage uses your numbers, not the internet.",
        actions: '<button class="pfc-button pfc-button--ghost" type="button">New conversation</button>'
      });

      /* Past conversation snippets */
      var hist = document.getElementById("sageHistory");
      hist.innerHTML = PFC_DATA.sageConversations.map(function (c) {
        return (
          '<article class="sage-history__item">' +
            '<p class="sage-history__q">' + c.q + '</p>' +
            '<p class="sage-history__a">' + c.a + '</p>' +
            '<a class="sage-history__continue" href="#">Continue</a>' +
          '</article>'
        );
      }).join("");

      /* Observations */
      var obs = document.getElementById("sageObs");
      obs.innerHTML = PFC_DATA.sageInsights.map(function (i) {
        return (
          '<div class="sage-observation">' +
            '<span class="sage-observation__dot" aria-hidden="true"></span>' +
            '<p class="sage-observation__text">' + i.text + '</p>' +
            '<a class="sage-observation__more" href="#">Tell me more</a>' +
          '</div>'
        );
      }).join("");

      /* Prompt pills fill the composer */
      var input = document.getElementById("sageInput");
      document.querySelectorAll(".sage-prompt").forEach(function (p) {
        p.addEventListener("click", function () {
          input.value = p.textContent.trim();
          input.focus();
        });
      });
    };
  </script>
</body>
</html>
