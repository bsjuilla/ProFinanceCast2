<header class="topbar" data-pfc-topbar>
  <div class="topbar__breadcrumb" data-slot="breadcrumb">
    <span>ProFinanceCast</span>
    <span class="topbar__breadcrumb-sep" aria-hidden="true">/</span>
    <span class="topbar__breadcrumb-current">Overview</span>
  </div>

  <div class="topbar__actions">
    <button type="button" class="topbar__search" data-action="open-command">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <span>Search or jump to</span>
      <span class="topbar__search-shortcut">
        <kbd class="kbd">Ctrl</kbd> <kbd class="kbd">K</kbd>
      </span>
    </button>

    <button type="button" class="btn btn--ghost btn--icon" aria-label="Notifications">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>
    </button>

    <button type="button" class="btn btn--ghost btn--icon" aria-label="Toggle theme" data-action="toggle-theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    </button>

    <button type="button" class="btn btn--ghost btn--icon" aria-label="Account menu" data-action="open-user-menu">
      <span class="sidebar__avatar" style="width:28px;height:28px;font-size:11px;">AM</span>
    </button>
  </div>
</header>
