<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ProFinanceCast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400&family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #F7F4ED;
    --ink-1: #2A251D;
    --ink-3: #7C7466;
    --accent: #8B2E22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; background: var(--canvas); }
  body {
    font-family: "Inter Tight", system-ui, sans-serif;
    color: var(--ink-1);
    padding: 80px;
    position: relative;
    overflow: hidden;
  }
  .mark {
    position: absolute;
    top: 64px;
    right: 80px;
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: #FBF9F4;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Fraunces", Georgia, serif;
    font-size: 36px;
    font-variation-settings: "opsz" 144;
    color: var(--ink-1);
    letter-spacing: -0.022em;
    line-height: 1;
    padding-bottom: 4px;
  }
  .divider {
    position: absolute;
    top: 100px;
    left: 80px;
    width: 84px;
    height: 1px;
    background: var(--accent);
  }
  .eyebrow {
    position: absolute;
    top: 78px;
    left: 80px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .stack {
    position: absolute;
    left: 80px;
    bottom: 96px;
    right: 240px;
  }
  .headline {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 400;
    font-variation-settings: "opsz" 144, "SOFT" 50;
    font-size: 92px;
    line-height: 1.04;
    letter-spacing: -0.022em;
    color: var(--ink-1);
    max-width: 880px;
  }
  .wordmark {
    position: absolute;
    bottom: 56px;
    left: 80px;
    font-family: "Fraunces", Georgia, serif;
    font-weight: 400;
    font-variation-settings: "opsz" 144;
    font-size: 22px;
    letter-spacing: -0.022em;
    color: var(--ink-3);
  }
</style>
</head>
<body>
  <div class="mark">P&middot;</div>
  <div class="eyebrow">THE FORECAST</div>
  <div class="divider"></div>
  <div class="stack">
    <h1 class="headline">The forecast your bank should have given you.</h1>
  </div>
  <div class="wordmark">ProFinanceCast</div>
</body>
</html>
