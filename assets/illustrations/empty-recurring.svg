<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-label="A circular calendar dial with an oxblood marker at twelve o'clock.">
  <rect width="480" height="320" fill="#F7F4ED"/>
  <g fill="none" stroke="#4D463A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="240" cy="160" r="100"/>
    <!-- tick marks at hours -->
    <line x1="240" y1="68" x2="240" y2="80"/>
    <line x1="332" y1="160" x2="320" y2="160"/>
    <line x1="240" y1="252" x2="240" y2="240"/>
    <line x1="148" y1="160" x2="160" y2="160"/>
    <line x1="305" y1="95" x2="297" y2="103"/>
    <line x1="305" y1="225" x2="297" y2="217"/>
    <line x1="175" y1="225" x2="183" y2="217"/>
    <line x1="175" y1="95" x2="183" y2="103"/>
  </g>
  <!-- oxblood marker at 12 -->
  <circle cx="240" cy="68" r="6" fill="#8B2E22"/>
</svg>
